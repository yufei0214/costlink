server:
  port: 8080

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/costlink?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai}
    username: ${SPRING_DATASOURCE_USERNAME:costlink}
    password: ${SPRING_DATASOURCE_PASSWORD:costlink123}
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.costlink.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# Application Configuration
app:
  jwt:
    secret: ${JWT_SECRET:CostLinkJwtSecretKeyForReimbursementService2024}
    expiration: 86400000  # 24 hours
  upload:
    path: ${UPLOAD_PATH:/app/uploads}
  admin:
    users: ${ADMIN_USERS:admin}
  ldap:
    # Basic LDAP settings
    enabled: ${LDAP_ENABLED:true}
    url: ${LDAP_URL:ldap://ldap.startdt.net:389}
    base: ${LDAP_BASE:dc=startdt,dc=net}
    user-dn-pattern: ${LDAP_USER_DN_PATTERN:uid={0},ou=people}
    # Service account mode (leave empty for simple bind mode)
    bind-dn: ${LDAP_BIND_DN:}
    bind-password: ${LDAP_BIND_PASSWORD:}
    user-search-filter: ${LDAP_USER_SEARCH_FILTER:(uid={0})}
    user-search-base: ${LDAP_USER_SEARCH_BASE:}
    # Attribute mapping
    attr-display-name: ${LDAP_ATTR_DISPLAY_NAME:cn}
    attr-email: ${LDAP_ATTR_EMAIL:mail}
  ocr:
    api-key: ${QWEN_API_KEY:}
    model: ${QWEN_MODEL:qwen-vl-plus}
    endpoint: ${QWEN_ENDPOINT:https://dashscope.aliyuncs.com/api/v1/services/aigc/multimodal-generation/generation}
    timeout: ${QWEN_TIMEOUT:30}
